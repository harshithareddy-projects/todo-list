<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My To-Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .add-btn {
            background-color: blue;
            color: white;
        }

        .delete-btn {
            background-color: red;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f5f5f5;
            margin: 10px 0;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My To-Do List</h1>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button class="add-btn" onclick="addTask()">Add</button>

    <h2>Tasks:</h2>
    <ul id="taskList"></ul>
</div>

<script>
    let count = 0;

    function addTask() {
        const input = document.getElementById("taskInput");
        const taskText = input.value.trim();

        if (taskText === "") return;

        count++;

        const li = document.createElement("li");
        li.innerHTML = `${count}. ${taskText} 
            <button class="delete-btn" onclick="deleteTask(this)">Delete</button>`;

        document.getElementById("taskList").appendChild(li);

        input.value = "";
    }

    function deleteTask(button) {
        button.parentElement.remove();
    }
</script>

</body>
</html>
